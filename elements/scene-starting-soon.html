<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Blanket · Starting Soon</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px;
    overflow: hidden;
    font-family: var(--font, 'Inter', system-ui, sans-serif);
    background: transparent;
    color: var(--text, #e8edf5);
  }
  .center {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .label {
    font-size: var(--label-size, 12px);
    font-weight: 500; letter-spacing: var(--label-spacing, 6px);
    color: var(--label-color, rgba(200, 220, 255, 0.5));
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .title {
    font-size: var(--title-size, 88px);
    font-weight: 600;
    letter-spacing: var(--title-spacing, -2px);
    color: var(--title-color, rgba(220, 235, 255, 0.95));
    text-shadow: var(--glow, 0 0 80px rgba(80, 140, 255, 0.4));
    line-height: 1;
    text-align: center;
  }
  .rule {
    display: flex; align-items: center; gap: 20px;
    margin: var(--rule-margin, 22px 0 18px);
  }
  .rule-line {
    width: var(--rule-w, 200px); height: 1px;
    background: linear-gradient(to var(--dir, right), var(--rule-color, rgba(255, 255, 255, 0.2)), transparent);
  }
  .rule-diamond {
    width: 10px; height: 10px;
    border: 1px solid var(--rule-color, rgba(255, 255, 255, 0.3));
    transform: rotate(45deg); flex-shrink: 0;
  }
  .subtitle {
    font-size: var(--sub-size, 28px);
    font-weight: 300; letter-spacing: 1px;
    color: var(--sub-color, rgba(160, 195, 255, 0.6));
    margin-bottom: 40px;
    text-align: center;
  }
  .timer-wrap {
    display: flex; gap: var(--timer-gap, 40px);
  }
  .timer-block {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  .timer-num {
    font-size: var(--timer-size, 56px);
    font-weight: 200; letter-spacing: 2px;
    color: var(--timer-color, rgba(220, 235, 255, 0.9));
    text-shadow: var(--glow, 0 0 40px rgba(80, 140, 255, 0.3));
    line-height: 1;
    min-width: 80px; text-align: center;
  }
  .timer-label {
    font-size: 11px; font-weight: 500; letter-spacing: 4px;
    color: rgba(160, 195, 255, 0.4); text-transform: uppercase;
  }
  .timer-sep {
    font-size: 48px; font-weight: 200;
    color: rgba(160, 195, 255, 0.2);
    align-self: flex-start; padding-top: 4px;
  }
  .progress-wrap {
    margin-top: 40px; width: 440px;
  }
  .progress-track {
    width: 100%; height: 2px;
    background: rgba(255, 255, 255, 0.08);
    border-radius: 2px; overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(to right, rgba(100, 150, 255, 0.4), rgba(160, 210, 255, 0.9));
    border-radius: 2px;
    width: 0;
  }
</style>
</head>
<body>
<div class="center">
  <div class="label" id="label">stream</div>
  <div class="title">starting soon</div>
  <div class="rule">
    <div class="rule-line" style="--dir:right"></div>
    <div class="rule-diamond"></div>
    <div class="rule-line" style="--dir:left"></div>
  </div>
  <div class="subtitle">get comfy — the stream is almost ready</div>
  <div class="timer-wrap">
    <div class="timer-block">
      <div class="timer-num" id="tm"></div>
      <div class="timer-label">minutes</div>
    </div>
    <div class="timer-sep">:</div>
    <div class="timer-block">
      <div class="timer-num" id="ts"></div>
      <div class="timer-label">seconds</div>
    </div>
  </div>
  <div class="progress-wrap">
    <div class="progress-track"><div class="progress-bar" id="progress-bar"></div></div>
  </div>
</div>
<script>
const label = document.body.getAttribute('data-label');
if (label) document.getElementById('label').textContent = label;
const sub = document.body.getAttribute('data-subtitle');
if (sub) document.querySelector('.subtitle').textContent = sub;

const START_SECONDS = parseInt(document.body.getAttribute('data-countdown') || '600');
let remaining = START_SECONDS;
const total = remaining;
const tm = document.getElementById('tm');
const ts = document.getElementById('ts');
const bar = document.getElementById('progress-bar');
bar.style.animation = `countdown ${remaining}s linear forwards`;
const style = document.createElement('style');
style.textContent = `@keyframes countdown { to { width: 100%; } }`;
document.head.appendChild(style);

function tick() {
  if (remaining <= 0) { tm.textContent='00'; ts.textContent='00'; return; }
  const m = Math.floor(remaining/60);
  const s = remaining % 60;
  tm.textContent = String(m).padStart(2,'0');
  ts.textContent = String(s).padStart(2,'0');
  remaining--;
  setTimeout(tick, 1000);
}
tick();
</script>
</body>
</html>
