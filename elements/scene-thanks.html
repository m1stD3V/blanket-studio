<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Blanket · Thanks</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px;
    overflow: hidden;
    font-family: var(--font, 'Inter', system-ui, sans-serif);
    background: transparent;
    color: var(--text, #e8edf5);
  }
  .center {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .label {
    font-size: var(--label-size, 12px);
    font-weight: 500; letter-spacing: var(--label-spacing, 6px);
    color: var(--label-color, rgba(200, 220, 255, 0.5));
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .title {
    font-size: var(--title-size, 92px);
    font-weight: 600;
    letter-spacing: var(--title-spacing, -2px);
    color: var(--title-color, rgba(220, 235, 255, 0.95));
    text-shadow: var(--glow, 0 0 80px rgba(80, 140, 255, 0.4));
    line-height: 1;
    text-align: center;
  }
  .rule {
    display: flex; align-items: center; gap: 20px;
    margin: var(--rule-margin, 22px 0 18px);
  }
  .rule-line {
    width: var(--rule-w, 200px); height: 1px;
    background: linear-gradient(to var(--dir, right), var(--rule-color, rgba(255, 255, 255, 0.2)), transparent);
  }
  .rule-diamond {
    width: 10px; height: 10px;
    border: 1px solid var(--rule-color, rgba(255, 255, 255, 0.3));
    transform: rotate(45deg); flex-shrink: 0;
  }
  .subtitle {
    font-size: var(--sub-size, 28px);
    font-weight: 300; letter-spacing: 1px;
    color: var(--sub-color, rgba(160, 195, 255, 0.6));
    text-align: center;
  }
  .sparkles {
    display: flex; gap: 28px; margin-top: 48px;
  }
  .sparkle {
    opacity: 0;
    animation: sparkle-in 0.5s ease-out forwards;
  }
  .sparkle:nth-child(1) { animation-delay: 0.2s; }
  .sparkle:nth-child(2) { animation-delay: 0.4s; }
  .sparkle:nth-child(3) { animation-delay: 0.6s; }
  .sparkle:nth-child(4) { animation-delay: 0.8s; }
  .sparkle:nth-child(5) { animation-delay: 1.0s; }
  @keyframes sparkle-in {
    from { opacity: 0; transform: scale(0.4) rotate(-20deg); }
    to   { opacity: 1; transform: scale(1) rotate(0deg); }
  }
  .farewell {
    font-size: 18px; font-weight: 300; letter-spacing: 3px;
    color: var(--sub-color, rgba(160, 195, 255, 0.4));
    text-transform: uppercase;
    margin-top: 36px;
    opacity: 0;
    animation: fadein 1.5s ease 1s forwards;
  }
  @keyframes fadein { to { opacity: 1; } }
</style>
</head>
<body>
<div class="center">
  <div class="label" id="label">stream</div>
  <div class="title">thanks for watching</div>
  <div class="rule">
    <div class="rule-line" style="--dir:right"></div>
    <div class="rule-diamond"></div>
    <div class="rule-line" style="--dir:left"></div>
  </div>
  <div class="subtitle">see you next time</div>
  <div class="sparkles" id="sparkles"></div>
  <div class="farewell">until next time</div>
</div>
<script>
const label = document.body.getAttribute('data-label');
if (label) document.getElementById('label').textContent = label;
const sub = document.body.getAttribute('data-subtitle');
if (sub) document.querySelector('.subtitle').textContent = sub;

const sparkles = document.getElementById('sparkles');
for (let i = 0; i < 5; i++) {
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('class', 'sparkle');
  svg.setAttribute('width', '24');
  svg.setAttribute('height', '24');
  svg.setAttribute('viewBox', '0 0 24 24');
  const c = 'rgba(220,235,255,0.7)';
  svg.innerHTML = `
    <line x1="12" y1="2" x2="12" y2="22" stroke="${c}" stroke-width="1.3"/>
    <line x1="2" y1="12" x2="22" y2="12" stroke="${c}" stroke-width="1.3"/>
    <line x1="5" y1="5" x2="19" y2="19" stroke="rgba(220,235,255,0.3)" stroke-width="0.8"/>
    <line x1="19" y1="5" x2="5" y2="19" stroke="rgba(220,235,255,0.3)" stroke-width="0.8"/>`;
  sparkles.appendChild(svg);
}
</script>
</body>
</html>
